<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#4facfe,#00f2fe);
    margin:0;
}

.container{
    max-width:400px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    padding:10px;
    margin:5px 2px;
    border:none;
    border-radius:5px;
    background:#4facfe;
    color:white;
}

li{
    background:#f1f1f1;
    margin:8px 0;
    padding:10px;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.completed{
    text-decoration: line-through;
    color:gray;
}

@media(max-width:500px){
    .container{width:90%;}
}
</style>

</head>

<body>

<div class="container">

<!-- AUTH -->
<div id="authDiv">
<h2 id="formTitle">Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="handleAuth()">Submit</button>

<p>
<span id="toggleText">Don't have account?</span>
<button onclick="toggleForm()">Register</button>
</p>
</div>

<!-- APP -->
<div id="appDiv" style="display:none;">
<h2>Task Manager</h2>

<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<input id="searchInput" placeholder="Search">
<button onclick="searchTask()">Search</button>

<button onclick="getTasks()">Refresh</button>
<button onclick="logout()">Logout</button>

<ul id="taskList"></ul>
</div>

</div>

<script>

const API_URL = "https://kbvsh80cyb.execute-api.ap-south-1.amazonaws.com/prod/tasks";

let allTasks = [];
let isLogin = true;

// Toggle Login/Register
function toggleForm(){
    isLogin = !isLogin;

    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Register";
    document.getElementById("toggleText").innerText = isLogin 
        ? "Don't have account?" 
        : "Already have account?";
}

// Login/Register
function handleAuth(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if(isLogin){
        if(users[user] && users[user] === pass){
            localStorage.setItem("login", user);
            showApp();
        } else {
            alert("Invalid login");
        }
    } else {
        if(users[user]){
            alert("User exists");
            return;
        }

        users[user] = pass;
        localStorage.setItem("users", JSON.stringify(users));

        alert("Registered! Login now");
        toggleForm();
    }
}

// Show App
function showApp(){
    document.getElementById("authDiv").style.display="none";
    document.getElementById("appDiv").style.display="block";
    getTasks();
}

// Logout
function logout(){
    localStorage.removeItem("login");
    location.reload();
}

// GET Tasks
function getTasks(){
    fetch(API_URL)
    .then(res=>res.json())
    .then(data=>{
        allTasks = data;
        displayTasks(data);
    });
}

// Display Tasks (NO DELETE)
function displayTasks(tasks){
    let list = document.getElementById("taskList");
    list.innerHTML="";

    tasks.forEach(task=>{
        let li = document.createElement("li");

        if(task.completed){
            li.classList.add("completed");
        }

        let text = document.createElement("span");
        text.textContent = task.task;

        // ✔ Complete checkbox
        let checkbox = document.createElement("input");
        checkbox.type="checkbox";
        checkbox.checked = task.completed;
        checkbox.onchange = ()=>toggleComplete(task);

        // ✏ Edit button
        let editBtn = document.createElement("button");
        editBtn.textContent="Edit";
        editBtn.onclick=()=>editTask(task);

        li.appendChild(checkbox);
        li.appendChild(text);
        li.appendChild(editBtn);

        list.appendChild(li);
    });
}

// Add Task
function addTask(){
    let task = document.getElementById("taskInput").value;

    fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({task:task})
    })
    .then(()=>getTasks());

    document.getElementById("taskInput").value="";
}

// Edit Task
function editTask(task){
    let newTask = prompt("Edit task", task.task);

    if(newTask){
        fetch(API_URL,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                id: task.id,
                task: newTask,
                completed: task.completed
            })
        })
        .then(()=>getTasks());
    }
}

// Mark Complete
function toggleComplete(task){
    fetch(API_URL,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            id: task.id,
            task: task.task,
            completed: !task.completed
        })
    })
    .then(()=>getTasks());
}

// Search
function searchTask(){
    let s = document.getElementById("searchInput").value.toLowerCase();

    let filtered = allTasks.filter(t =>
        t.task.toLowerCase().includes(s)
    );

    displayTasks(filtered);
}

// Auto login
if(localStorage.getItem("login")){
    showApp();
}

</script>

</body>
</html>
